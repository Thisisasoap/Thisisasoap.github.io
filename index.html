<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOTHING</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f9b233;
      --text: #000000;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #f9b233;
        --text: #000000;
      }
    }

    body {
      font-family: sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      overflow: hidden;
    }

    /* 3D模型容器：绝对定位，占满全屏，层级在竖线之下 */
    #model-container {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* 竖线纹理：层级在模型之上、文字之下，左右留间隙 */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        90deg,
        var(--text),
        var(--text) 2px,
        transparent 2px,
        transparent 22px
      );
      opacity: 0.9;
      z-index: 2;
      margin: 0 12%;
      pointer-events: none;
    }

    /* NOTHING文字：最上层，层级最高 */
    .nothing-text {
      font-size: clamp(6rem, 15vw, 12rem);
      font-weight: 900;
      color: var(--text);
      letter-spacing: 0.1em;
      z-index: 3;
      text-transform: uppercase;
      user-select: none;
      font-family: "Arial Black", sans-serif;
      transition: transform 0.2s ease;
      position: relative;
    }

    .nothing-text:hover {
      transform: scale(1.05);
    }

    /* 移动端适配 */
    @media (max-width: 768px) {
      .nothing-text {
        font-size: clamp(3rem, 12vw, 6rem);
        letter-spacing: 0.05em;
      }
    }
  </style>
</head>

<body>
  <!-- 3D模型容器 -->
  <div id="model-container"></div>

  <!-- 点击文字跳转个人主页 -->
  <a href="/about.html" style="text-decoration: none; color: inherit;">
    <div class="nothing-text">NOTHING</div>
  </a>

  <!-- Three.js 3D模型加载脚本（修复版） -->
  <script type="module">
    // 引入Three.js核心库和加载器
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    // 1. 初始化场景、相机、渲染器
    const container = document.getElementById('model-container');
    const scene = new THREE.Scene();
    scene.background = null; // 透明背景，不遮挡橙色底色

    // 相机适配屏幕比例
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 3); // 初始相机位置，适配大多数模型

    // 渲染器开启抗锯齿+透明通道
    const renderer = new THREE.WebGLRenderer({ 
      antialias: true, 
      alpha: true,
      preserveDrawingBuffer: true 
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 适配高DPI屏幕
    container.appendChild(renderer.domElement);

    // 2. 添加灯光（解决模型全黑问题）
    const ambientLight = new THREE.AmbientLight(0xffffff, 1.5); // 环境光，提亮整体
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 1); // 方向光，增加立体感
    directionalLight.position.set(5, 5, 5);
    scene.add(directionalLight);

    // 3. 加载3D模型（关键：加错误捕获，排查问题）
    const loader = new GLTFLoader();
    loader.load(
      'model.glb', // 模型路径，必须和仓库里的文件名完全一致！
      (gltf) => {
        // 模型加载成功
        console.log('模型加载成功！');
        const model = gltf.scene;
        scene.add(model);

        // 自动适配模型大小，避免模型太大/太小
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const fov = camera.fov * (Math.PI / 180);
        const cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
        
        // 调整相机位置，让模型完整显示
        camera.position.z = cameraZ * 1.5;
        camera.updateProjectionMatrix();

        // 让模型自动缓慢旋转，更有动态感
        function animateModel() {
          requestAnimationFrame(animateModel);
          model.rotation.y += 0.005; // 旋转速度，可自行调整
          renderer.render(scene, camera);
        }
        animateModel();
      },
      (xhr) => {
        // 加载进度
        console.log(`模型加载进度: ${(xhr.loaded / xhr.total * 100).toFixed(2)}%`);
      },
      (error) => {
        // 加载失败，打印错误信息
        console.error('模型加载失败！错误信息：', error);
        alert('模型加载失败，请检查：1. 模型文件名是否为model.glb 2. 是否上传到仓库根目录');
      }
    );

    // 4. 窗口大小自适应
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
