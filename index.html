<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOTHING</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* 固定原图风格：橙底黑字，不受系统明暗模式影响 */
    :root {
      --bg: #f9b233; /* 原图暖橙色背景 */
      --text: #000000; /* 纯黑色文字 */
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #f9b233;
        --text: #000000;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      transition: background 0.3s;
      cursor: pointer; /* 鼠标悬停显示手型，提示可点击 */
    }

    /* 1:1还原原图竖线背景纹理 */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: repeating-linear-gradient(
        90deg,
        var(--text),
        var(--text) 2px,
        transparent 2px,
        transparent 20px
      );
      opacity: 0.9;
      z-index: 0;
      pointer-events: none;
    }

    /* NOTHING 文字样式，还原圆润粗体效果 */
    .nothing-text {
      font-size: clamp(6rem, 15vw, 12rem); /* 自适应屏幕大小 */
      font-weight: 900;
      color: var(--text);
      letter-spacing: 0.1em;
      z-index: 1;
      text-transform: uppercase;
      user-select: none;
      font-family: "Arial Black", Gadget, sans-serif;
      -webkit-font-smoothing: antialiased;
      transition: transform 0.2s ease; /* 点击动画 */
    }

    .nothing-text:hover {
      transform: scale(1.05); /* 鼠标悬停放大，增强交互感 */
    }

    /* 移动端适配 */
    @media (max-width: 768px) {
      .nothing-text {
        font-size: clamp(3rem, 12vw, 6rem);
        letter-spacing: 0.05em;
      }
    }
  </style>
</head>
<body>
  <!-- 点击文字跳转到个人主页 about.html -->
  <a href="/about.html" style="text-decoration: none; color: inherit;">
    <div class="nothing-text">NOTHING</div>
  </a>
</body>
</html>
