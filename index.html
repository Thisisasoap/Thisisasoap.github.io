
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  {
    "imports": {
      "three": "https://esm.sh/three",
      "three/addons/": "https://esm.sh/three/examples/jsm/"

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f9b233;
      --text: #000000;
      --progress: 0;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #f9b233;
        --text: #000000;
      }
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      overflow-x: hidden;
    }

    /* 滚动区域容器 */
    .scroll-container {
      height: 1100vh;
      position: relative;
    }

    /* 固定的视口层 - NOTHING 首屏 */
    .hero {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      z-index: 10;
    }

    /* 竖线背景 - 分左右两部分便于分开移动 */
    .lines-left,
    .lines-right {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      background-image: repeating-linear-gradient(
        90deg,
        var(--text),
        var(--text) 2px,
        transparent 2px,
        transparent 20px
      );
      opacity: 0.9;
      transition: transform 0.05s linear;
    }

    .lines-left {
      left: 0;
      transform: translateX(0);
    }

    .lines-right {
      right: 0;
      transform: translateX(0);
    }

    /* NOTHING 文字 */
    .nothing-text {
      font-size: clamp(6rem, 15vw, 12rem);
      font-weight: 900;
      color: var(--text);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      user-select: none;
      font-family: "Arial Black", Gadget, sans-serif;
      -webkit-font-smoothing: antialiased;
      transition: transform 0.2s ease, opacity 0.1s linear;
      cursor: pointer;
      z-index: 5;
    }

    .nothing-text:hover {
      transform: scale(1.05);
    }

    /* 底部展示区域 */
    .reveal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      pointer-events: none;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .reveal.active {
      pointer-events: auto;
      opacity: 1;
    }

    /* 圆圈容器 - 整体偏左 */
    .circles {
      position: absolute;
      top: 45%;
      left: 25%;
      transform: translate(-25%, -50%) scale(0);
      transition: transform 1s ease;
    }

    .reveal.active .circles {
      transform: translate(-25%, -50%) scale(1.15);
    }

    /* 黑色描边圆圈 */
    .circle {
      position: absolute;
      border: 3px solid var(--text);
      border-radius: 50%;
      transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .circle-1 { width: 120px; height: 120px; top: -80px; left: -120px; }
    .circle-2 { width: 400px; height: 400px; top: -120px; left: 20px; }
    .circle-3 { width: 300px; height: 300px; top: 80px; left: -200px; }
    .circle-4 { width: 100px; height: 100px; top: 160px; left: 60px; }
    .circle-5 { width: 140px; height: 140px; top: -240px; left: 180px; }
    .circle-6 { width: 100px; height: 100px; top: -150px; left: 280px; }
    .circle-7 { width: 180px; height: 180px; top: 200px; left: 140px; }

    /* 右侧文字 */
    .reveal-text {
      position: absolute;
      top: 50%;
      right: 10%;
      transform: translateY(-50%);
      text-align: right;
      opacity: 0;
      transition: opacity 0.5s ease 0.3s;
    }

    .reveal.active .reveal-text {
      opacity: 1;
    }

    .reveal-text h2 {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      color: var(--text);
      font-weight: 700;
      margin-bottom: 0.5rem;
      font-family: "Arial Black", Gadget, sans-serif;
    }

    .reveal-text p {
      font-size: clamp(0.9rem, 2vw, 1.2rem);
      color: var(--text);
      font-weight: 400;
      opacity: 0.8;
    }

    /* 底部导航 */
    .bottom-nav {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      opacity: 0;
      transition: all 0.5s ease 0.5s;
      z-index: 25;
    }

    .reveal.active ~ .bottom-nav {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .bottom-nav a {
      display: inline-block;
      padding: 0.8rem 1.5rem;
      background: var(--text);
      color: var(--bg);
      text-decoration: none;
      font-weight: 600;
      border-radius: 30px;
      transition: transform 0.2s ease;
      font-family: "Arial Black", Gadget, sans-serif;
    }

    .bottom-nav a:hover {
      transform: scale(1.05);
    }

    /* C 阶段：右下角一点放射，黑/橙交替占满屏 */
    .rays-layer {
      position: fixed;
      inset: 0;
      z-index: 22;
      pointer-events: none;
      opacity: 0;
      background: repeating-conic-gradient(
        from var(--rays-from, 0deg) at 92% 94%,
        #000 0deg 1.8deg,
        #f9b233 1.8deg 3.6deg
      );
      clip-path: circle(0px at 92% 94%);
      -webkit-clip-path: circle(0px at 92% 94%);
    }

    /* 3D 模型层 — 放在射线之上，完全露出 */
    .model-canvas {
      position: fixed;
      inset: 0;
      z-index: 23;
      pointer-events: none;
      opacity: 0;
    }

    /* ── Phase D: 照片墙 ── */
    .photo-wall {
      position: fixed;
      inset: 0;
      z-index: 24;
      pointer-events: none;
      opacity: 0;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      padding: 2rem;
      justify-content: center;
      background: #ffffff;
      overflow: hidden;
    }

    /* 行用 translate3d 动画 + 独立层，减轻横向滚动时的发糊（Chrome/Edge 常见） */
    .photo-row {
      display: flex;
      gap: 1rem;
      width: max-content;
      transform: translate3d(0, 0, 0);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .photo-row img {
      width: 320px;
      height: 228px;
      object-fit: cover;
      border-radius: 8px;
      flex-shrink: 0;
      transform: translateZ(0) scale(1);
      -webkit-transform: translateZ(0) scale(1);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
    }

    .photo-row img:hover {
      transform: translateZ(0) scale(1.12);
      z-index: 10;
    }

    .photo-row:nth-child(1) { animation: scroll-row-1 18s linear infinite; }
    .photo-row:nth-child(2) { animation: scroll-row-2 22s linear infinite reverse; }
    .photo-row:nth-child(3) { animation: scroll-row-3 15s linear infinite; }

    @keyframes scroll-row-1 {
      0%   { transform: translate3d(0, 0, 0); }
      100% { transform: translate3d(-50%, 0, 0); }
    }
    @keyframes scroll-row-2 {
      0%   { transform: translate3d(-30%, 0, 0); }
      100% { transform: translate3d(0, 0, 0); }
    }
    @keyframes scroll-row-3 {
      0%   { transform: translate3d(-15%, 0, 0); }
      100% { transform: translate3d(20%, 0, 0); }
    }

    /* ── Phase E: Profile（背景与全站橙黄一致） ── */
    .profile-wall {
      position: fixed;
      inset: 0;
      z-index: 25;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4rem 6vw;
      background: var(--bg);
      pointer-events: none;
      opacity: 0;
    }

    .profile-left {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-width: 45vw;
      cursor: pointer;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .profile-left:hover {
      transform: scale(1.08);
    }

    .profile-left:active {
      transform: scale(0.97);
    }

    .profile-left h1 {
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 900;
      color: #000000;
      font-family: "Arial Black", Gadget, sans-serif;
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .profile-left p {
      font-size: clamp(0.9rem, 1.5vw, 1.1rem);
      color: #555555;
      font-weight: 400;
      line-height: 1.6;
    }

    .profile-right {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 1rem;
      width: clamp(280px, 40vw, 520px);
      height: clamp(210px, 30vw, 390px);
    }

    .profile-square {
      border: 2px solid #000000;
      background: transparent;
      opacity: 0;
      cursor: pointer;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                 opacity 0.3s ease;
    }

    .profile-square:hover {
      transform: scale(1.06);
    }

    .profile-square:active {
      transform: scale(0.95);
    }

    .profile-square:nth-child(1)  { grid-area: 1 / 1 / 2 / 3; }
    .profile-square:nth-child(2)  { grid-area: 1 / 3 / 3 / 4; }
    .profile-square:nth-child(3)  { grid-area: 1 / 4 / 2 / 5; }
    .profile-square:nth-child(4)  { grid-area: 2 / 1 / 3 / 2; }
    .profile-square:nth-child(5)  { grid-area: 2 / 2 / 4 / 3; }
    .profile-square:nth-child(6)  { grid-area: 2 / 4 / 3 / 5; }
    .profile-square:nth-child(7)  { grid-area: 3 / 1 / 4 / 2; }
    .profile-square:nth-child(8)  { grid-area: 3 / 3 / 4 / 5; }

    /* 移动端适配 */
    @media (max-width: 768px) {
      .nothing-text {
        font-size: clamp(3rem, 12vw, 6rem);
        letter-spacing: 0.05em;
      }

      .circle-1 { width: 80px; height: 80px; top: -50px; left: -80px; }
      .circle-2 { width: 140px; height: 140px; top: -40px; left: 10px; }
      .circle-3 { width: 100px; height: 100px; top: 60px; left: -60px; }
      .circle-4 { width: 70px; height: 70px; top: 120px; left: 40px; }
      .circle-5 { width: 100px; height: 100px; top: -80px; left: 120px; }
      .circle-6 { width: 60px; height: 60px; top: 30px; left: 140px; }
      .circle-7 { width: 120px; height: 120px; top: 80px; left: 100px; }

      .reveal-text {
        right: 5%;
      }

      .rays-layer {
        background: repeating-conic-gradient(
          from var(--rays-from, 0deg) at 88% 96%,
          #000 0deg 2.25deg,
          #f9b233 2.25deg 4.5deg
        );
        clip-path: circle(0px at 88% 96%);
        -webkit-clip-path: circle(0px at 88% 96%);
      }

      .photo-wall {
        gap: 1rem;
        padding: 1rem;
      }

      .photo-row img {
        width: 200px;
        height: 200px;
      }
    }

    /* 照片灯箱 */
    .photo-lightbox {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .photo-lightbox.active {
      opacity: 1;
      pointer-events: auto;
    }

    .photo-lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 8px;
      transform: scale(0.9);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .photo-lightbox.active img {
      transform: scale(1);
    }

    .photo-lightbox-close {
      position: absolute;
      top: 1.5rem;
      right: 2rem;
      font-size: 2.5rem;
      color: #fff;
      cursor: pointer;
      line-height: 1;
      user-select: none;
      transition: transform 0.2s ease;
    }

    .photo-lightbox-close:hover {
      transform: scale(1.2);
    }
  </style>
</head>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const linesLeft = document.querySelector('.lines-left');
    const linesRight = document.querySelector('.lines-right');
    const nothingText = document.querySelector('.nothing-text');
    const reveal = document.querySelector('.reveal');
    const circles = document.querySelectorAll('.circle');
    const revealText = document.querySelector('.reveal-text');
    const raysLayer = document.querySelector('.rays-layer');
    const bottomNav = document.querySelector('.bottom-nav');
    const modelCanvas = document.querySelector('.model-canvas');
    const photoWall = document.querySelector('.photo-wall');
    const profileWall = document.querySelector('.profile-wall');
    const profileSquares = document.querySelectorAll('.profile-square');

    // ── Three.js 场景 ────────────────────────────────────────
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: modelCanvas, alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    // 投影到屏幕右下角 92% 94%
    function positionCamera() {
      const x =  (window.innerWidth  * 0.92) - window.innerWidth  / 2;
      const y = -(window.innerHeight * 0.94) + window.innerHeight / 2;
      camera.position.set(x, y, 5);
      camera.lookAt(x, y, 0);
    }
    positionCamera();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      positionCamera();
    });

    // 加载 1.glb，中心放在 (0,0,0)，相机已对齐圆心
    let model = null;
    const loader = new GLTFLoader();
    loader.load('/1.glb', (gltf) => {
      model = gltf.scene;
      model.visible = false;
      model.scale.setScalar(0.5);
      scene.add(model);
    });

    // 滚动相关配置
    const scrollContainer = document.querySelector('.scroll-container');
    const totalScrollHeight = scrollContainer.offsetHeight;

    // 五段滚动节点（按 1100vh 分配）
    // Phase A: 0 → 20%  竖线散开 + NOTHING 消失 + 圆圈出现
    // Phase B: 20% → 40% 圆圈向四周散开、离开视口
    // Phase C: 40% → 60% 射线旋出占满 → 随滚动旋走消失
    // Phase D: 60% → 80% 照片墙横向滚动
    // Phase E: 80% → 100% 黑色线条方块 + 字体随滚动浮现
    const phaseAEnd = totalScrollHeight * 0.20;
    const phaseBEnd = totalScrollHeight * 0.40;
    const phaseCEnd = totalScrollHeight * 0.60;
    const phaseDEnd = totalScrollHeight * 0.80;
    const phaseEEffectiveEnd = totalScrollHeight * 0.985;

    // 每个圆圈散开的「基准方向」（单位向量 dx, dy），从视觉中心(25%, 45%)指向各圆
    const circleDirs = [
      { dx: -0.9, dy: -0.4 },  // circle-1 左上
      { dx:  0.5, dy: -0.6 },  // circle-2 右上（大圆）
      { dx: -0.9, dy:  0.3 },  // circle-3 左中
      { dx:  0.5, dy:  0.7 },  // circle-4 右下
      { dx:  0.8, dy: -0.5 },  // circle-5 右
      { dx:  0.9, dy: -0.3 },  // circle-6 右
      { dx:  0.6, dy:  0.8 },  // circle-7 右下
    ];
    // 超出屏幕的最小距离（视口对角线的 1.2 倍）
    const diag = Math.sqrt(window.innerWidth ** 2 + window.innerHeight ** 2);
    const scatterDist = diag * 1.3;

    // Phase C 射线旋走 — 追踪鼠标滚轮增量
    let wheelDelta = 0;
    window.addEventListener('wheel', (e) => {
      if (window.scrollY > phaseBEnd) {
        wheelDelta += e.deltaY * 0.3;
        wheelDelta = Math.max(-600, Math.min(600, wheelDelta));
      }
    }, { passive: true });

    function handleScroll() {
      const scrollY = window.scrollY;
      const vw = window.innerWidth;

      // ── Phase A: 竖线 + NOTHING + 圆圈出现 ──────────────────────
      const progressA = Math.min(scrollY / phaseAEnd, 1);

      const maxOffset = vw * 0.6;
      linesLeft.style.transform  = `translateX(${-maxOffset * progressA}px)`;
      linesRight.style.transform = `translateX(${maxOffset * progressA}px)`;

      nothingText.style.opacity   = Math.max(1 - progressA * 2, 0);
      nothingText.style.transform = `scale(${1 - progressA * 0.5})`;

      if (scrollY > phaseAEnd * 0.8) {
        reveal.classList.add('active');
      } else {
        reveal.classList.remove('active');
      }

      // ── Phase B: 圆圈向四周散开 ───────────────────────────────
      let progressB = 0;
      if (scrollY > phaseAEnd) {
        progressB = Math.min((scrollY - phaseAEnd) / (phaseBEnd - phaseAEnd), 1);
      }

      circles.forEach((circle, i) => {
        const { dx, dy } = circleDirs[i];
        const dist = progressB * scatterDist;
        const ease = easeOutCubic(progressB);
        circle.style.transform = `translate(${dx * dist * ease}px, ${dy * dist * ease}px)`;
      });

      // 文字在 B 阶段中淡出
      if (progressB > 0) {
        revealText.style.opacity = Math.max(1 - progressB * 2.5, 0);
      }

      // ── Phase C: 射线旋走 + 3D 模型消失 ─────────────────────
      let progressC = 0;
      if (scrollY > phaseBEnd && scrollY <= phaseCEnd) {
        progressC = Math.min((scrollY - phaseBEnd) / (phaseCEnd - phaseBEnd), 1);
      }

      const easeC = easeInOutCubic(progressC);
      const isNarrow = window.matchMedia('(max-width: 768px)').matches;
      const cx = isNarrow ? '88%' : '92%';
      const cy = isNarrow ? '96%' : '94%';

      // 射线半径：先扩张(0→0.5)，后半段旋走消失(0.5→1)
      const maxR = 165;
      let r;
      if (progressC <= 0.5) {
        r = maxR * easeInOutCubic(progressC * 2);
      } else {
        r = maxR * (1 - easeInOutCubic((progressC - 0.5) * 2));
      }

      raysLayer.style.opacity = progressC > 0.5
        ? String(Math.max(0, 1 - (progressC - 0.5) * 2))
        : String(Math.min(easeC * 1.35, 1));

      // 射线随 scroll + wheelDelta 旋转旋走
      const spinDeg = easeC * 240 + wheelDelta;
      raysLayer.style.setProperty('--rays-from', `${spinDeg}deg`);
      raysLayer.style.setProperty('-webkit-clip-path', `circle(${r}vmax at ${cx} ${cy})`);
      raysLayer.style.clipPath = `circle(${r}vmax at ${cx} ${cy})`;

      // 模型淡出
      if (model) {
        if (progressC > 0.5) {
          model.visible = false;
          modelCanvas.style.opacity = '0';
        } else {
          model.visible = true;
          modelCanvas.style.opacity = String(Math.min(easeC * 1.5, 1));
          model.rotation.y = easeC * Math.PI * 3;
          model.rotation.x = easeC * Math.PI * 0.5;
        }
      }

      if (progressC > 0 && progressC <= 1) {
        renderer.render(scene, camera);
      }

      // ── Phase D: 照片墙显现，E 阶段后开始淡出 ─────────────────────
      let progressD = 0;
      if (scrollY > phaseCEnd && scrollY <= phaseDEnd) {
        progressD = Math.min((scrollY - phaseCEnd) / (phaseDEnd - phaseCEnd), 1);
      }

      const easeD = easeInOutCubic(progressD);
      if (scrollY > phaseCEnd && scrollY <= phaseDEnd) {
        photoWall.style.opacity = String(easeD);
        photoWall.style.pointerEvents = 'auto';
        photoWall.style.visibility = 'visible';
        raysLayer.style.opacity = '0';
        modelCanvas.style.opacity = '0';
      }

      // ── Phase E: Profile 浮现 ────────────────────────────────
      let progressE = 0;
      if (scrollY > phaseDEnd) {
        progressE = Math.min((scrollY - phaseDEnd) / (phaseEEffectiveEnd - phaseDEnd), 1);
      }

      const easeE = easeInOutCubic(progressE);

      if (progressE > 0) {
        profileWall.style.opacity = String(easeE);
        profileWall.style.pointerEvents = 'auto';
        const left = profileWall.querySelector('.profile-left');
        left.style.pointerEvents = 'auto';
      } else {
        profileWall.style.opacity = '0';
        profileWall.style.pointerEvents = 'none';
        const left = profileWall.querySelector('.profile-left');
        left.style.pointerEvents = 'none';
      }

      // 照片墙在 E 阶段更快淡出，并 visibility 切断叠层残影
      if (scrollY > phaseDEnd) {
        const fadeT = Math.min(1, progressE / 0.38);
        const photoOp = Math.max(0, 1 - easeInOutCubic(fadeT));
        photoWall.style.opacity = String(photoOp);
        photoWall.style.pointerEvents = 'none';
        photoWall.style.visibility = photoOp < 0.02 ? 'hidden' : 'visible';
      }
      if (scrollY <= phaseCEnd) {
        photoWall.style.opacity = '0';
        photoWall.style.pointerEvents = 'none';
        photoWall.style.visibility = 'hidden';
      }

      // 方块错落浮现：每个方块延迟不同
      profileSquares.forEach((sq, i) => {
        const delayOffset = i * 0.07;
        const localP = Math.max(0, progressE - delayOffset) / (1 - delayOffset);
        const localEased = easeInOutCubic(Math.min(localP, 1));
        sq.style.opacity = String(localEased);
      });

      // 导航消失
      if (progressC > 0.02 || progressD > 0 || progressE > 0) {
        const navFade = Math.max(progressC, progressD, progressE);
        bottomNav.style.opacity = String(Math.max(0, 1 - navFade * 2.5));
        bottomNav.style.transform = 'translateX(-50%) translateY(100px)';
      } else {
        bottomNav.style.opacity = '';
        bottomNav.style.transform = '';
      }
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function easeInOutCubic(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    // 使用 requestAnimationFrame 优化性能
    let ticking = false;
    window.addEventListener('scroll', () => {
      if (!ticking) {
        requestAnimationFrame(() => {
          handleScroll();
          ticking = false;
        });
        ticking = true;
      }
    });

    // 初始化
    handleScroll();

    // Profile 左侧点击跳转 about.html
    const profileLeft = document.querySelector('.profile-left');
    profileLeft.addEventListener('click', () => {
      window.location.href = '/about.html';
    });

    // 照片灯箱逻辑
    const lightbox = document.getElementById('photoLightbox');
    const lightboxImg = document.getElementById('photoLightboxImg');
    const lightboxClose = document.getElementById('photoLightboxClose');

    document.querySelectorAll('.photo-row img').forEach(img => {
      img.addEventListener('click', (e) => {
        e.stopPropagation();
        lightboxImg.src = img.src;
        lightboxImg.alt = img.alt;
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
      });
    });

    lightboxClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && lightbox.classList.contains('active')) {
        closeLightbox();
      }
    });

    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
    }
  </script>

  <!-- 照片灯箱 -->
  <div class="photo-lightbox" id="photoLightbox">
    <span class="photo-lightbox-close" id="photoLightboxClose">&times;</span>
    <img src="" alt="" id="photoLightboxImg">
  </div>
</body>
</html>
