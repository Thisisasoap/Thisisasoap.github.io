<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的个人主页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f7f8fa;
      --card: #ffffff;
      --text: #333;
      --sub: #666;
      --accent: #4e6ef2;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --card: #252525;
        --text: #eee;
        --sub: #aaa;
        --accent: #6599ff;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      padding: 2rem 1rem;
      transition: all 0.3s;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    /* 回到首页按钮 */
    .back-home {
      text-align: center;
      margin-bottom: 2rem;
    }

    .back-home a {
      display: inline-block;
      padding: 0.8rem 1.5rem;
      background: var(--accent);
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 500;
      transition: 0.2s;
    }

    .back-home a:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      margin-bottom: 2rem;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 1rem;
      border: 3px solid var(--accent);
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }

    .bio {
      color: var(--sub);
      margin-bottom: 1.5rem;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-top: 1.5rem;
    }

    .links a {
      padding: 0.6rem 1.2rem;
      background: var(--accent);
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 500;
      transition: 0.2s;
    }

    .links a:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    .section {
      margin-top: 2rem;
    }

    .section h2 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #eee;
    }

    .item {
      margin-bottom: 1rem;
    }

    .item h3 {
      font-size: 1rem;
      margin-bottom: 0.3rem;
    }

    .item p {
      color: var(--sub);
      font-size: 0.9rem;
    }

    footer {
      text-align: center;
      color: var(--sub);
      font-size: 0.85rem;
      margin-top: 3rem;
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- 回到首页按钮 -->
    <div class="back-home">
      <a href="/">← 回到 NOTHING 首页</a>
    </div>

    <div class="card">
      <img class="avatar" src="https://picsum.photos/200/200" alt="头像">
      <h1>你的名字</h1>
      <p class="bio">简单介绍一下自己：学生 / 爱好者 / 正在努力学习中</p>

      <div class="links">
        <a href="https://github.com/Thisisasoap">GitHub</a>
        <a href="mailto:your@email.com">邮箱</a>
      </div>
    </div>

    <div class="section">
      <h2>关于我</h2>
      <p>热爱技术，喜欢折腾，正在学习编程、网页制作，希望用代码创造有趣的东西。</p>
    </div>

    <div class="section">
      <h2>技能</h2>
      <div class="item">
        <h3>编程基础</h3>
        <p>HTML / CSS / Python 等</p>
      </div>
      <div class="item">
        <h3>工具</h3>
        <p>GitHub / VS Code / 在线编辑器</p>
      </div>
    </div>

    <div class="section">
      <h2>项目</h2>
      <div class="item">
        <h3>个人主页</h3>
        <p>使用 GitHub Pages 搭建的免费个人网站</p>
      </div>
    </div>

    <footer>
      © 2026 我的个人主页 · 由 GitHub Pages 驱动
    </footer>
  </div>
</body>
</html>
