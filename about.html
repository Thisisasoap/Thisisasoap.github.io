
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的个人主页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f9b233;
      --card: #ffffff;
      --text: #333;
      --sub: #666;
      --accent: #f9b233;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #f9b233;
        --card: #252525;
        --text: #000000;
        --sub: #aaa;
        --accent: #f9b233;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      padding: 1rem 1rem;
      padding-top: 70px;
      transition: all 0.3s;
    }

    /* 导航栏 */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #f9b233;
      border-bottom: 2px solid #000;
      z-index: 1000;
      padding: 0.8rem 1rem;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 1.5rem;
    }

    .navbar-brand {
      font-family: "黑体", "Microsoft YaHei", sans-serif;
      font-size: 1.1rem;
      font-weight: bold;
      color: #000;
    }

    .navbar ul {
      list-style: none;
      display: flex;
      justify-content: flex-end;
      gap: 2rem;
    }

    .navbar a {
      color: #000;
      font-family: "黑体", "Microsoft YaHei", sans-serif;
      text-decoration: none;
      font-size: 1rem;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .navbar a:hover {
      background: var(--accent);
      color: white;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    /* 回到首页按钮 */
    .back-home {
      text-align: center;
      margin-bottom: 2rem;
    }

    .back-home a {
      display: inline-block;
      padding: 0.8rem 1.5rem;
      background: var(--accent);
      color: rgb(0, 0, 0);
      border-radius: 10px;
      text-decoration: none;
      font-weight: 500;
      transition: 0.2s;
    }

    .back-home a:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    .card {
      background: #f9b233;
      border: 2px solid #000;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      margin-bottom: 2rem;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 1rem;
      border: 3px solid var(--accent);
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }

    .bio {
      color: #ffffff;
      margin-bottom: 1.5rem;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-top: 1.5rem;
    }

    .links a {
      padding: 0.6rem 1.2rem;
      background: var(--accent);
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 500;
      transition: 0.2s;
    }

    .links a:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    .section {
      margin-top: 2rem;
    }

    .section h2 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #eee;
      scroll-margin-top: 80px;
    }

    /* 图片网格展示 */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin-top: 1rem;
    }

    .image-grid.single {
      grid-template-columns: 1fr;
      max-width: 400px;
    }

    .image-grid.nine-grid {
      grid-template-columns: repeat(3, 1fr);
    }

    /* 视频样式 */
    .video-container {
      margin-top: 1rem;
      border: 2px solid #000;
      border-radius: 8px;
      overflow: hidden;
      max-width: 600px;
    }

    .video-container video {
      width: 100%;
      display: block;
    }

    .image-grid img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border: 2px solid #000;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .image-grid.single img {
      aspect-ratio: auto;
    }

    .image-grid img:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .item {
      margin-bottom: 1rem;
    }

    .item h3 {
      font-size: 1rem;
      margin-bottom: 0.3rem;
    }

    .item p {
      color: var(--sub);
      font-size: 0.9rem;
    }

    footer {
      text-align: center;
      color: var(--sub);
      font-size: 0.85rem;
      margin-top: 3rem;
    }
  </style>
</head>

<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <span class="navbar-brand">孢落·良坪菌语</span>
    <ul>
      <li><a href="#观物构形">观物构形</a></li>
      <li><a href="#以色表意">以色表意</a></li>
      <li><a href="#以触探质">以触探质</a></li>
      <li><a href="#立体构成">立体构成</a></li>
    </ul>
  </nav>

  <div class="container">
    <!-- 回到首页按钮 -->
    <div class="back-home">
      <a href="/">← 回到 NOTHING 首页</a>
    </div>

    <div class="card">
      <img class="avatar" src="https://picsum.photos/200/200" alt="头像">
      <h1>孢落·良坪菌语</h1>
      <p class="bio">因为不知道放什么，所以只能随便放一些作业</p>
      <div class="links">
      </div>
    </div>

    <div class="section">
      <h2 id="观物构形">观物构形</h2>
      <div class="item">
        <h3>黑白</h3>
        <p style="color: #ffffff;">黑白构成</p>
        <div class="image-grid">
          <img src="images/bw1.jpg" alt="黑白图片1">
          <img src="images/bw2.jpg" alt="黑白图片2">
          <img src="images/bw3.jpg" alt="黑白图片3">
          <img src="images/bw4.jpg" alt="黑白图片4">
        </div>
      </div>
      <div class="item">
        <h3>彩色</h3>
        <p style="color: #ffffff;">彩色构成</p>
        <div class="image-grid">
          <img src="images/color1.jpg" alt="彩色图片1">
          <img src="images/color2.jpg" alt="彩色图片2">
          <img src="images/color3.jpg" alt="彩色图片3">
          <img src="images/color4.jpg" alt="彩色图片4">
        </div>
      </div>
    </div>

    <div class="section">
      <h2 id="以色表意">以色表意</h2>
      <div class="item">
        <h3>颜色提取</h3>
        <p style="color: #ffffff;">颜色提取作业</p>
        <div class="image-grid single">
          <img src="images/extraction.jpg" alt="颜色提取">
        </div>
      </div>
      <div class="item">
        <h3>色调</h3>
        <p style="color: #ffffff;">色调练习</p>
        <div class="image-grid">
          <img src="images/tone1.jpg" alt="色调1">
          <img src="images/tone2.jpg" alt="色调2">
          <img src="images/tone3.jpg" alt="色调3">
          <img src="images/tone4.jpg" alt="色调4">
        </div>
      </div>
      <div class="item">
        <h3>色调2</h3>
        <p style="color: #ffffff;">色调练习2</p>
        <div class="image-grid">
          <img src="images/tone2-1.jpg" alt="色调2-1">
          <img src="images/tone2-2.jpg" alt="色调2-2">
          <img src="images/tone2-3.jpg" alt="色调2-3">
          <img src="images/tone2-4.jpg" alt="色调2-4">
        </div>
      </div>
      
      <div class="item">
        <h3>明度九调</h3>
        <p style="color: #ffffff;">明度九调练习</p>
        <div class="image-grid nine-grid">
          <img src="images/light1.jpg" alt="明度1">
          <img src="images/light2.jpg" alt="明度2">
          <img src="images/light3.jpg" alt="明度3">
          <img src="images/light4.jpg" alt="明度4">
          <img src="images/light5.jpg" alt="明度5">
          <img src="images/light6.jpg" alt="明度6">
          <img src="images/light7.jpg" alt="明度7">
          <img src="images/light8.jpg" alt="明度8">
          <img src="images/light9.jpg" alt="明度9">
        </div>
      </div>
    </div>

    <div class="section">
      <h2 id="以触探质">以触探质</h2>
      <div class="item">
        <h3>视觉纹理</h3>
        <p style="color: #ffffff;">视觉纹理练习</p>
        <div class="image-grid">
          <img src="images/visual1.jpg" alt="视觉纹理1">
          <img src="images/visual2.jpg" alt="视觉纹理2">
          <img src="images/visual3.jpg" alt="视觉纹理3">
          <img src="images/visual4.jpg" alt="视觉纹理4">
        </div>
      </div>
      <div class="item">
        <h3>触觉纹理</h3>
        <p style="color: #ffffff;">懒得再把每一个抠出来了</p>
        <div class="image-grid">
          <img src="images/tactile1.jpg" alt="触觉纹理1">
        </div>
      </div>
    </div>

    <div class="section">
      <h2>视频作品</h2>
      <div class="item">
        <h3>视频</h3>
        <p style="color: #ffffff;">只要有视频就行了吧（应该）</p>
        <div class="video-container">
          <video controls>
            <source src="videos/demo.mp4" type="video/mp4">
            您的浏览器不支持视频播放
          </video>
        </div>
      </div>
    </div>

    <!-- 3D模型展示区 -->
    <div class="section">
      <h2 id="立体构成">立体构成</h2>
  <model-viewer 
    src="model.glb" 
    alt="3D模型展示" 
    auto-rotate 
    camera-controls 
    shadow-intensity="1" 
    style="width:100%; height:500px; border-radius:12px; background:var(--bg);"
  ></model-viewer>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</div>

    <footer>
      © 2026 我的个人主页 · 由 GitHub Pages 驱动
    </footer>
  </div>
</body>
</html>
